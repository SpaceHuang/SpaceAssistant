name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure tag points to a commit on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Release tag must point to a commit on the main branch."
            exit 1
          fi
          if ! git branch -r --contains "${GITHUB_SHA}" | grep -qE 'origin/main$'; then
            echo "::error::Release tag must point to a commit on main."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) is on main."

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - name: Install better-sqlite3 native bindings (Node)
        run: npm run rebuild:native
      - run: npm run i18n:generate-types
      - run: npm run i18n:check
      - run: npm test

  build:
    name: Build (${{ matrix.artifact_name }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            pack: win
            artifact_name: windows
          - os: macos-latest
            pack: mac
            artifact_name: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      # windows-latest 自 2026-06 起使用 VS 2026（18.x），需 node-gyp >= 12.1.0（npm >= 11.6.3）才能识别
      - name: Upgrade npm for VS 2026 support
        if: runner.os == 'Windows'
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Install better-sqlite3 native bindings (Node + Electron)
        run: npm run rebuild:native

      - name: Build & pack
        run: npm run build && npx electron-builder --${{ matrix.pack }} --publish never
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Verify macOS app signature
        if: matrix.pack == 'mac'
        run: |
          APP=$(find release -name '*.app' -type d | head -n 1)
          test -n "$APP"
          npm run verify:macos-app -- "$APP"

      - name: Probe better-sqlite3 under Electron
        run: npm run probe:sqlite
        env:
          ELECTRON_RUN_AS_NODE: '1'

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*.exe
            release/*.dmg
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true
          if-no-files-found: error

      - name: Compose release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" \
            -f target_commitish="${GITHUB_SHA}" \
            --jq .body > /tmp/release-notes.md
          cat .github/release-appendix.md >> /tmp/release-notes.md

      - name: Prepare release assets
        run: |
          echo "Downloaded artifact tree:"
          find release-assets -type f | sort
          mkdir -p dist-release
          find release-assets -type f \( -name '*.exe' -o -name '*.dmg' \) -exec cp -v {} dist-release/ \;
          echo "Release assets:"
          ls -la dist-release
          test "$(find dist-release -type f | wc -l)" -ge 3

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: dist-release/*
          fail_on_unmatched_files: true
          overwrite_assets: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
