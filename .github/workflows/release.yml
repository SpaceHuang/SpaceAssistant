name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag points to a commit on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Release tag must point to a commit on the main branch."
            exit 1
          fi
          if ! git branch -r --contains "${GITHUB_SHA}" | grep -qE 'origin/main$'; then
            echo "::error::Release tag must point to a commit on main."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) is on main."

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run i18n:generate-types
      - run: npm run i18n:check
      - run: npm test

  build:
    name: Build (${{ matrix.artifact_name }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            pack: win
            artifact_name: windows
          - os: macos-latest
            pack: mac
            artifact_name: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & pack
        run: npm run pack:${{ matrix.pack }}
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/**
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: actions/checkout@v4

      - name: Compose release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" \
            -f target_commitish="${GITHUB_SHA}" \
            --jq .body > /tmp/release-notes.md
          cat .github/release-appendix.md >> /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
