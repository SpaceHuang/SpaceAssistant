name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Install better-sqlite3 native bindings (Node)
        run: npm run rebuild:native
      - run: npm run i18n:generate-types
      - run: npm run i18n:check
      - run: npm test
